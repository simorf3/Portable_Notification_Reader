name: Build (Windows portable)

on:
  push:
    branches: [ main ]
    tags: [ "v*" ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write   # needed so tag builds can publish a Release

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Run tests
        run: cargo test --release --target x86_64-pc-windows-msvc

      # Stage a FLAT folder with just the files a user needs. This is what
      # fixes the "folder inside a folder" and the stray "target" folder:
      # we copy the single exe out of target\... into dist\ and never upload
      # the build directory itself.
      - name: Stage portable files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target\x86_64-pc-windows-msvc\release\PortableNotificationReader.exe" `
                    "dist\PortableNotificationReader.exe"
          Copy-Item "README.md"  "dist\README.md"
          Copy-Item "README.html" "dist\README.html"
          Copy-Item "LICENSE"    "dist\LICENSE.txt"

      # --- Optional code signing --------------------------------------------
      # Signs the exe ONLY if the two secrets below are set in the repo
      # (Settings -> Secrets and variables -> Actions):
      #   CODESIGN_PFX_BASE64  = base64 of your .pfx  (self-signed is fine)
      #   CODESIGN_PASSWORD    = the .pfx password
      # A self-signed certificate does NOT remove the SmartScreen warning, but
      # it stamps the exe with a stable publisher identity so users can add you
      # to "Trusted Publishers" once and skip the warning on future versions.
      # If the secrets are absent the step is simply skipped (unsigned build).
      - name: Sign executable (optional)
        if: env.CODESIGN_PFX_BASE64 != ''
        shell: pwsh
        env:
          CODESIGN_PFX_BASE64: ${{ secrets.CODESIGN_PFX_BASE64 }}
          CODESIGN_PASSWORD: ${{ secrets.CODESIGN_PASSWORD }}
        run: |
          [IO.File]::WriteAllBytes("cert.pfx", [Convert]::FromBase64String($env:CODESIGN_PFX_BASE64))
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" |
                      Sort-Object FullName -Descending | Select-Object -First 1 -ExpandProperty FullName
          & $signtool sign `
              /f cert.pfx /p $env:CODESIGN_PASSWORD `
              /fd sha256 /tr http://timestamp.digicert.com /td sha256 `
              "dist\PortableNotificationReader.exe"
          Remove-Item cert.pfx
          & $signtool verify /pa "dist\PortableNotificationReader.exe"

      # --- SHA-256 hash so users can verify the download is authentic --------
      - name: Compute SHA-256
        id: hash
        shell: pwsh
        run: |
          $h = (Get-FileHash "dist\PortableNotificationReader.exe" -Algorithm SHA256).Hash
          "$h  PortableNotificationReader.exe" | Out-File -Encoding ascii "dist\PortableNotificationReader.exe.sha256"
          "SHA256=$h" | Out-File -Append -Encoding ascii $env:GITHUB_OUTPUT
          Write-Host "SHA-256: $h"

      # The artifact contains the CONTENTS of dist\ (exe + readme + licence +
      # the .sha256 file), not a nested folder and not the build tree.
      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: PortableNotificationReader
          path: dist/*

      # --- Release (only on version tags like v1.0.0) ------------------------
      - name: Zip for release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: Compress-Archive -Path dist\* -DestinationPath PortableNotificationReader.zip -Force

      - name: Write release notes
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          @"
          ### Portable Notification Reader

          Unzip and run ``PortableNotificationReader.exe`` — no installation needed.

          > **Windows SmartScreen:** this app is not signed with a paid certificate,
          > so Windows shows *"Windows protected your PC"*. Click **More info -> Run anyway**.
          > See the README for details.

          **Verify your download (SHA-256):**
          ``````
          ${{ steps.hash.outputs.SHA256 }}
          ``````
          In PowerShell: ``Get-FileHash .\PortableNotificationReader.exe -Algorithm SHA256``
          "@ | Out-File -Encoding utf8 release-notes.md

      - name: Publish Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            PortableNotificationReader.zip
            dist/PortableNotificationReader.exe.sha256
