name: Build Windows executable

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install Rust (stable MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Stage portable package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target/x86_64-pc-windows-msvc/release/PortableNotificationReader.exe dist/
          Copy-Item README.md dist/
          Copy-Item LICENSE dist/ -ErrorAction SilentlyContinue
          Compress-Archive -Path dist/* -DestinationPath PortableNotificationReader.zip -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: PortableNotificationReader
          path: |
            target/x86_64-pc-windows-msvc/release/PortableNotificationReader.exe
            PortableNotificationReader.zip

      - name: Attach to GitHub Release (tagged builds only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/x86_64-pc-windows-msvc/release/PortableNotificationReader.exe
            PortableNotificationReader.zip
