  - name: Sign executable
        shell: pwsh
        run: |
          # Decode certificate from a GitHub secret (base64-encoded .pfx)
          $pfxBytes = [Convert]::FromBase64String("${{ secrets.CODESIGN_PFX_BASE64 }}")
          [IO.File]::WriteAllBytes("cert.pfx", $pfxBytes)
          
          # Sign the exe
          & "C:\Program Files (x86)\Windows Kits\10\bin\10.0.22621.0\x64\signtool.exe" sign `
            /f cert.pfx `
            /p "${{ secrets.CODESIGN_PASSWORD }}" `
            /tr http://timestamp.digicert.com `
            /td sha256 /fd sha256 `
            "dist\PortableNotificationReader.exe"
          
          Remove-Item cert.pfx
